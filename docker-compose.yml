services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: management_app
        volumes:
            - .:/var/www/html
        depends_on:
            - mysql_management
        networks:
            - laravel

    web:
        image: nginx:latest
        container_name: management_nginx
        ports:
            - "88:88"
        volumes:
            - .:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - laravel

    mysql_management:
        image: mysql:8.4
        container_name: mysql_management
        restart: always
        environment:
            MYSQL_DATABASE: management
            MYSQL_ROOT_PASSWORD: root
        ports:
            - "3323:3306"
        volumes:
            - dbdata:/var/lib/mysql
        networks:
            - laravel

volumes:
    dbdata:

networks:
    laravel:
        driver: bridge
